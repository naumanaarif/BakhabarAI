<p class="font-body-md text-body-md text-on-surface-variant">Sent to +92 300 XXXXXXX</p>
</div>
<!-- OTP Inputs Grid -->
<div class="flex flex-row items-center justify-center gap-sm mb-xxl w-full max-w-[320px]">
<input aria-label="OTP digit 1" class="w-14 h-[52px] bg-surface-container-lowest text-center font-headline-md text-headline-md text-on-surface rounded-xl border border-outline-variant focus:border-secondary-container focus:border-2 focus:ring-0 focus:outline-none transition-colors shadow-sm" maxlength="1" type="text" value="4"/>
<input aria-label="OTP digit 2" autofocus="" class="w-14 h-[52px] bg-surface-container-lowest text-center font-headline-md text-headline-md text-on-surface rounded-xl border border-secondary-container border-2 focus:ring-0 focus:outline-none transition-colors shadow-sm" maxlength="1" type="text"/>
