<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-md md:text-headline-md text-on-surface mb-xs">
                    Salam! Let's get started
                </h1>
<p class="font-body-md text-body-md text-on-surface-variant">
                    Enter your phone number to access the intelligence platform.
                </p>
</div>
<!-- Form Area -->
<form action="#" class="flex flex-col gap-lg w-full" method="POST">
<!-- Phone Number Input Group -->
<div class="flex flex-col gap-base w-full">
<label class="sr-only font-label-sm text-label-sm text-on-surface-variant" for="phone-input">Phone Number</label>
<div class="relative flex items-center w-full h-52px bg-surface border border-outline-variant rounded-xl overflow-hidden focus-within:border-secondary-container focus-within:ring-1 focus-within:ring-secondary-container transition-all shadow-sm">
<!-- Country Code Prefix -->
<div class="flex items-center h-full px-sm border-r border-outline-variant bg-surface-container-lowest text-on-surface">
<span aria-hidden="true" class="mr-2 text-lg leading-none">🇵🇰</span>
<span class="font-body-md text-body-md font-medium text-on-surface">+92</span>
</div>
<!-- Input Field -->
<input autocomplete="tel-national" class="flex-1 h-full px-sm bg-transparent border-none outline-none font-body-md text-body-md text-on-surface placeholder:text-outline focus:ring-0" id="phone-input" name="phone" placeholder="300 1234567" required="" type="tel"/>
</div>
</div>
<!-- CTA Button -->
<button class="w-full h-52px bg-secondary-container text-on-secondary font-label-md text-label-md rounded-2xl flex items-center justify-center hover:opacity-90 active:scale-[0.98] transition-all duration-200 shadow-md" type="submit">

                </button>
</form>

<div class="mt-lg text-center w-full">
<p class="font-body-sm text-body-sm text-on-surface-variant">

                        Login
                    </a>
</p>

<div class="mt-xl flex justify-center items-center gap-xs text-outline opacity-60 pb-md md:pb-0">
<span aria-hidden="true" class="material-symbols-outlined text-[16px]">lock</span>
<span class="font-label-sm text-label-sm">Secure Intelligence Portal</span>
</div>
</div>
