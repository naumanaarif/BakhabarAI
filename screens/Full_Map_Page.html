<script>
    function centerMapOnUser() {
        const marker = document.getElementById('user-location-marker');
        const btn = document.getElementById('recenter-btn');
        
        if (!marker) return;

        if (!navigator.geolocation) {
            console.error("Geolocation is not supported by this browser.");
            return;
        }

        if (btn) btn.classList.add('animate-pulse');

        navigator.geolocation.getCurrentPosition((position) => {
            const { latitude, longitude } = position.coords;
            
            // Simulating centering on a mock map by moving the marker to the center
            marker.style.top = '50%';
            marker.style.left = '50%';
            marker.style.transition = 'all 1s ease-in-out';
            
            console.log(`Centered map at: ${latitude}, ${longitude}`);
            if (btn) btn.classList.remove('animate-pulse');
            
            showToast("Location synchronized");
        }, (error) => {
            console.error("Error getting location:", error);
            if (btn) btn.classList.remove('animate-pulse');
            showToast("Location access required");
        });
    }

    function showToast(message) {
        const existingToast = document.querySelector('.location-toast');
        if (existingToast) existingToast.remove();

        const toast = document.createElement('div');
        toast.className = 'location-toast fixed bottom-24 left-1/2 -translate-x-1/2 bg-inverse-surface text-inverse-on-surface px-4 py-2 rounded-full text-label-md z-[100] shadow-lg animate-bounce';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => {
            toast.style.opacity = '0';
            toast.style.transition = 'opacity 0.5s ease';
            setTimeout(() => toast.remove(), 500);
        }, 3000);
    }

    document.addEventListener('DOMContentLoaded', () => {
        // Auto-center on load
        centerMapOnUser();
        
        // Link the recenter button
        const recenterBtn = document.getElementById('recenter-btn');
        if (recenterBtn) {
            recenterBtn.addEventListener('click', centerMapOnUser);
        }
    });
</script>
